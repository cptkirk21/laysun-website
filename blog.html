  <!-- Blog Header -->

  <!-- Featured Post -->
  <section class="featured-post" id="featured-post">
    <div class="container">
      <h2>Featured Article</h2>
      <div id="featured-content">Loading featured post...</div>
    </div>
  </section>

  <!-- Blog Grid -->
  <section class="blog-grid" id="blog-grid">
    <div class="container">
      <h2>All Articles</h2>

    </div>

  <!-- Blog JavaScript -->
  <script>
    // CSP-compliant blog rendering
    document.addEventListener('DOMContentLoaded', function() {
      console.log('Blog rendering initiated');
      
      // Fetch blog data
      fetch('https://raw.githubusercontent.com/cptkirk21/laysun-website/main/blog-index.json')
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json();
        })
        .then(data => {
          console.log('Blog data loaded:', data);
          renderBlog(data);
        })
        .catch(error => {
          console.error('Error loading blog data:', error);
          document.getElementById('featured-content').textContent = 'Error loading blog content';
          document.getElementById('blog-content').textContent = 'Error loading blog posts';
        });

      function renderBlog(blogData) {
        // Render featured post
        const featuredContainer = document.getElementById('featured-content');
        if (blogData.featured && blogData.featured.slug) {
          const featuredPost = blogData.posts.find(post => post.slug === blogData.featured.slug);
          if (featuredPost) {
            const featuredDiv = document.createElement('div');
            featuredDiv.className = 'featured-article';
            
            const title = document.createElement('h3');
            title.textContent = featuredPost.title;
            
            const excerpt = document.createElement('p');
            excerpt.textContent = featuredPost.excerpt;
            
            const link = document.createElement('a');
            link.href = `/blog/${featuredPost.slug}`;
            link.textContent = 'Read More';
            link.className = 'read-more';
            
            featuredDiv.appendChild(title);
            featuredDiv.appendChild(excerpt);
            featuredDiv.appendChild(link);
            featuredContainer.appendChild(featuredDiv);
          } else {
            featuredContainer.textContent = 'Featured post not found';
          }
        } else {
          featuredContainer.textContent = 'No featured post configured';
        }

        // Render blog grid
        const blogContainer = document.getElementById('blog-content');
        const gridDiv = document.createElement('div');
        gridDiv.className = 'posts-grid';
        
        blogData.posts.forEach(post => {
          if (post.slug !== blogData.featured?.slug) {
            const postDiv = document.createElement('div');
            postDiv.className = 'post-card';
            
            const title = document.createElement('h4');
            title.textContent = post.title;
            
            const excerpt = document.createElement('p');
            excerpt.textContent = post.excerpt;
            
            const link = document.createElement('a');
            link.href = `/blog/${post.slug}`;
            link.textContent = 'Read Article';
            link.className = 'article-link';
            
            postDiv.appendChild(title);
            postDiv.appendChild(excerpt);
            postDiv.appendChild(link);
            gridDiv.appendChild(postDiv);
          }
        });
        
        blogContainer.appendChild(gridDiv);
      }
    });
  </script>
