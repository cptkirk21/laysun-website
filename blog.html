<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaySun Blog - Commercial Artificial Plant Insights</title>
    <meta name="description" content="Expert insights on commercial artificial plants for hotels, offices, and commercial properties. Fire safety, procurement, and compliance guidance.">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 60px 0;
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            color: white;
            margin: -20px -20px 40px -20px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin: 40px 0;
        }
        .blog-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .blog-card:hover {
            transform: translateY(-5px);
        }
        .blog-image {
            height: 200px;
            background: #e8f5e8;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        .blog-content {
            padding: 20px;
        }
        .blog-title {
            font-size: 1.4em;
            margin-bottom: 10px;
            color: #2e7d32;
        }
        .blog-meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .blog-description {
            color: #555;
            margin-bottom: 15px;
        }
        .read-more {
            color: #1976d2;
            text-decoration: none;
            font-weight: bold;
        }
        .read-more:hover {
            text-decoration: underline;
        }
        .featured-badge {
            background: #ff9800;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>LaySun Blog</h1>
            <div class="subtitle">Commercial Artificial Plant Insights for Hotels & Properties</div>
        </div>
        
        <div id="blog-posts">
            <!-- Blog posts will be dynamically loaded here -->
            <div style="text-align: center; padding: 40px;">
                <p>Loading blog posts...</p>
            </div>
        </div>
    </div>

    <script>
        // Load blog posts from blog-index.json
        fetch('blog-index.json')
            .then(response => response.json())
            .then(posts => {
                const blogContainer = document.getElementById('blog-posts');
                blogContainer.innerHTML = '';
                
                if (posts.length === 0) {
                    blogContainer.innerHTML = '<div style="text-align: center; padding: 40px;"><p>No blog posts available yet.</p></div>';
                    return;
                }
                
                const grid = document.createElement('div');
                grid.className = 'blog-grid';
                
                posts.forEach(post => {
                    const card = document.createElement('div');
                    card.className = 'blog-card';
                    
                    card.innerHTML = `
                        <div class="blog-image">
                            Featured Image
                        </div>
                        <div class="blog-content">
                            <h3 class="blog-title">
                                ${post.title}
                                ${post.featured ? '<span class="featured-badge">Featured</span>' : ''}
                            </h3>
                            <div class="blog-meta">
                                ${post.date} • ${post.readTime} • ${post.category}
                            </div>
                            <p class="blog-description">${post.description}</p>
                            <a href="blog-${post.slug}.html" class="read-more">Read More →</a>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
                
                blogContainer.appendChild(grid);
            })
            .catch(error => {
                console.error('Error loading blog posts:', error);
                document.getElementById('blog-posts').innerHTML = '<div style="text-align: center; padding: 40px;"><p>Error loading blog posts.</p></div>';
            });
    </script>
</body>
</html>
